[project]
name = "dalmatian"
revision = "1.0"

[providers]
local = "dotenv://.env"
vault = "vault://secrets2.scottylabs.org/secret"

[profiles.dev]
DISCORD_TOKEN = { description = "Discord bot token from the Developer Portal Bot tab", providers = ["local"] }
DISCORD_CLIENT_ID = { description = "Discord application client ID from the OAuth2 tab", providers = ["local"] }
GOOGLE_MAPS_API_KEY = { description = "Google Maps Static API key for dining hall map previews", required = false, providers = ["vault", "local"] }
CANVAS_ACCESS_TOKEN = { description = "Canvas API token for syllabus data scraping scripts", required = false, providers = ["vault", "local"] }

[profiles.prod]
DISCORD_TOKEN = { description = "Production Discord bot token" }
DISCORD_CLIENT_ID = { description = "Production Discord application client ID" }
GOOGLE_MAPS_API_KEY = { description = "Google Maps Static API key", required = false }

# Kennel maps staging / pr-* branches to these profiles (see kennel guides/secrets.md)
[profiles.staging]
DISCORD_TOKEN = { description = "Staging Discord bot token" }
DISCORD_CLIENT_ID = { description = "Staging Discord application client ID" }
GOOGLE_MAPS_API_KEY = { description = "Google Maps Static API key", required = false }

[profiles.preview]
DISCORD_TOKEN = { description = "PR preview Discord bot token", required = false }
DISCORD_CLIENT_ID = { description = "PR preview Discord application client ID", required = false }
GOOGLE_MAPS_API_KEY = { description = "Google Maps Static API key", required = false }
