[project]
name = "dalmatian"
revision = "1.0"

[providers]
local = "dotenv://.env"
vault = "vault://secrets2.scottylabs.org/secret"

[profiles.dev]
DISCORD_TOKEN = { description = "Discord bot token from the Developer Portal Bot tab", providers = ["local"] }
DISCORD_CLIENT_ID = { description = "Discord application client ID from the OAuth2 tab", providers = ["local"] }
GOOGLE_MAPS_API_KEY = { description = "Google Maps Static API key for dining hall map previews", required = false, providers = ["vault", "local"] }

[profiles.prod]
DISCORD_TOKEN = { description = "Production Discord bot token" }
DISCORD_CLIENT_ID = { description = "Production Discord application client ID" }
GOOGLE_MAPS_API_KEY = { description = "Google Maps Static API key", required = false }
