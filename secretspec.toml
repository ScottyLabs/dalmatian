[project]
name = "dalmatian"
revision = "1.0"

[profiles.dev]
DISCORD_TOKEN = { description = "Discord bot token from the Developer Portal Bot tab" }
DISCORD_CLIENT_ID = { description = "Discord application client ID from the OAuth2 tab" }
GOOGLE_MAPS_API_KEY = { description = "Google Maps Static API key for dining hall map previews", required = false }
CANVAS_ACCESS_TOKEN = { description = "Canvas API token for syllabus data scraping scripts", required = false }

[profiles.prod]
DISCORD_TOKEN = { description = "Production Discord bot token" }
DISCORD_CLIENT_ID = { description = "Production Discord application client ID" }
GOOGLE_MAPS_API_KEY = { description = "Google Maps Static API key", required = false }
