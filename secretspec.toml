[project]
name = "dalmatian"
revision = "1.0"

[providers]
local = "dotenv://.env"

[profiles.default]
GOOGLE_MAPS_API_KEY = { description = "Google Maps Static API key for dining hall map previews", required = false }

[profiles.dev]
DISCORD_TOKEN = { description = "Discord bot token from the Developer Portal Bot tab", providers = ["local"] }
DISCORD_CLIENT_ID = { description = "Discord application client ID from the OAuth2 tab", providers = ["local"] }
CANVAS_ACCESS_TOKEN = { description = "Canvas API token for syllabus data scraping scripts", required = false, providers = ["local"] }

[profiles.prod]
DISCORD_TOKEN = { description = "Production Discord bot token" }
DISCORD_CLIENT_ID = { description = "Production Discord application client ID" }
