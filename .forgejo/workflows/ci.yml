name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    checks:
        runs-on: docker
        steps:
            - name: Checkout
              uses: https://code.forgejo.org/actions/checkout@v6

            - name: Setup Deno
              uses: https://github.com/denoland/setup-deno@v2
              with:
                  deno-version: "2.7.14"
                  cache: true

            - name: Cache dependencies
              run: deno cache --frozen src/index.ts tests/*.test.ts

            - name: Type check
              run: deno check src/

            - name: Format
              run: deno run --allow-all npm:@biomejs/biome format

            - name: Lint
              run: |
                  PLATFORM=$(deno eval 'const a=Deno.build.arch==="aarch64"?"arm64":Deno.build.arch==="x86_64"?"x64":Deno.build.arch;console.log(`${Deno.build.os}-${a}`)')
                  DENO_DIR=$(deno eval 'console.log(Deno.env.get("DENO_DIR")??`${Deno.env.get("HOME")}/.cache/deno`)')
                  TSGO_BIN=$(find "$DENO_DIR/npm/registry.npmjs.org/@oxlint-tsgolint/$PLATFORM" -name tsgolint -type f | head -1)
                  export PATH="$(dirname "$TSGO_BIN"):$PATH"
                  deno task lint

            - name: Test
              run: deno task test
