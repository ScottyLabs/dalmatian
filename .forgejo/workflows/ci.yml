name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: docker
    env:
      SECRETSPEC_PROVIDER: dotenv
      SECRETSPEC_PROFILE: dev
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v6

      - name: Install Nix
        uses: https://github.com/cachix/install-nix-action@v31

      - name: Install devenv
        run: nix profile install --accept-flake-config nixpkgs#devenv

      - name: Placeholder secrets for CI
        run: |
          cat > .env <<'EOF'
          DISCORD_TOKEN=meow
          DISCORD_CLIENT_ID=meow
          EOF

      - name: Cache dependencies
        run: devenv shell -- deno cache --frozen src/index.ts tests/*.test.ts

      - name: Type check
        run: devenv shell -- deno check src/

      - name: Format
        run: devenv shell -- treefmt --fail-on-change --no-cache

      - name: Lint
        run: devenv shell -- oxlint --deny correctness

      - name: Test
        run: devenv shell -- deno task test
