name: Task (Non-Technical)
description: (Non-Technical) Standard Dalmatian Development issue
title: "[BRIEF DESCRIPTION]"
labels: []
body:
  - type: markdown
    attributes:
      value: "## Overall Objective"

  - type: textarea
    id: objective
    attributes:
      label: Overall Objective
      description: What is this issue trying to accomplish and why? If applicable where does the project stand right now?
      placeholder: "e.g. Users currently see stale data because the cache isn't invalidated on update. This issue fixes that."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Suggested Approach"

  - type: textarea
    id: approach
    attributes:
      label: Suggested Approach
      description: What might be a good direction to go down or what might be good resources/ideas to start from. If applicable.
      placeholder: |
        1. Use X to do Y
        2. I suggest looking up the docs for X
        3. Think about how to X
    validations:
      required: true
