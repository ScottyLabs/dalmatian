inputs:
    scottylabs:
        url: git+https://codeberg.org/scottylabs/devenv
    bun2nix:
        url: github:nix-community/bun2nix
        inputs:
            nixpkgs:
                follows: nixpkgs
    git-hooks:
        url: github:cachix/git-hooks.nix
        inputs:
            nixpkgs:
                follows: nixpkgs
    treefmt-nix:
        url: github:numtide/treefmt-nix
secretspec:
    enable: true
    profile: dev
    provider: vault://secrets2.scottylabs.org/secret
